<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Performance Tread — the RoboSole lightweight energy-return boot base for dynamic humanoid robots">
  <defs>
    <radialGradient id="p3bg" cx="50%" cy="44%" r="70%"><stop offset="0" stop-color="#0e161a"/><stop offset="1" stop-color="#060809"/></radialGradient>
    <linearGradient id="p3metal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#232a33"/><stop offset="0.55" stop-color="#141920"/><stop offset="1" stop-color="#0b0e13"/></linearGradient>
    <linearGradient id="p3cyan" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
    <filter id="p3glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#p3bg)"/>
  <g stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"><path d="M0 150H800M0 300H800M0 450H800M200 0V600M400 0V600M600 0V600"/></g>
  <ellipse cx="410" cy="484" rx="280" ry="28" fill="#22d3ee" fill-opacity="0.16" filter="url(#p3glow)"/>

  <!-- slim lightweight boot base (side profile) -->
  <path d="M214 452 C210 420 214 366 220 336 C224 306 240 294 272 292 L392 292 C466 298 542 320 596 356 C640 380 664 398 658 420 C654 434 640 440 622 444 L256 456 C232 456 216 450 214 452 Z" fill="url(#p3metal)" stroke="#3a414c" stroke-width="2"/>
  <!-- lightweight cut-outs / speed vents -->
  <g fill="#0b0d11" stroke="#2b3038" stroke-width="1.4"><ellipse cx="360" cy="360" rx="20" ry="26"/><ellipse cx="430" cy="368" rx="18" ry="24"/><ellipse cx="500" cy="382" rx="16" ry="20"/></g>
  <!-- ankle-mount collar -->
  <ellipse cx="342" cy="294" rx="64" ry="15" fill="#0b0d11" stroke="#2b3038" stroke-width="2"/>
  <ellipse cx="342" cy="294" rx="50" ry="9" fill="none" stroke="url(#p3cyan)" stroke-width="2" opacity="0.85"/>
  <!-- exposed spring-return heel (left/back) -->
  <g stroke="url(#p3cyan)" stroke-width="4" fill="none" opacity="0.95" filter="url(#p3glow)"><path d="M214 452 q-14 -14 0 -28 q14 -14 0 -28 q-14 -14 0 -26"/></g>
  <!-- glowing energy-return sole core -->
  <path d="M222 430 L636 422" stroke="url(#p3cyan)" stroke-width="6" filter="url(#p3glow)"/>
  <!-- toe roller -->
  <circle cx="648" cy="422" r="10" fill="#0d0f13" stroke="url(#p3cyan)" stroke-width="2"/>
  <!-- outsole (shallow, minimal lugs) -->
  <path d="M218 446 L634 438 Q658 438 656 452 L650 466 Q646 474 628 474 L238 478 Q214 478 214 462 Z" fill="#0c0e12" stroke="#20242c" stroke-width="2"/>
  <g fill="#14171c" stroke="#262b33" stroke-width="1.3"><rect x="236" y="460" width="42" height="16" rx="4"/><rect x="292" y="460" width="42" height="16" rx="4"/><rect x="348" y="459" width="42" height="16" rx="4"/><rect x="404" y="458" width="42" height="15" rx="4"/><rect x="460" y="456" width="40" height="14" rx="4"/><rect x="514" y="453" width="38" height="13" rx="4"/></g>
  <text x="400" y="556" text-anchor="middle" font-family="'Space Grotesk',system-ui,sans-serif" font-size="21" letter-spacing="4" fill="#7c828e">PERFORMANCE TREAD · SPEED</text>
</svg>
