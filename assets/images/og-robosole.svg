<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="RoboSole — humanoid robot footwear">
  <defs>
    <linearGradient id="obg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1014"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="ocyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="oglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#obg)"/>
  <g stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1">
    <path d="M0 160 H1200 M0 320 H1200 M0 480 H1200"/>
    <path d="M200 0 V630 M500 0 V630 M800 0 V630 M1000 0 V630"/>
  </g>
  <ellipse cx="600" cy="470" rx="360" ry="40" fill="#22d3ee" fill-opacity="0.14" filter="url(#oglow)"/>

  <!-- mark -->
  <g transform="translate(96,150) scale(4.6)" stroke="url(#ocyan)" stroke-width="1.8" fill="none" filter="url(#oglow)">
    <path d="M9 3h9a5 5 0 0 1 5 5v3.5a6 6 0 0 1-1.2 3.6l-3 4A6 6 0 0 0 17.6 23l-.3 2.2A4 4 0 0 1 13.3 29H9a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3Z"/>
    <path d="M6 10.5h5M6 15h5M6 19.5h5" stroke-linecap="round"/>
  </g>

  <text x="260" y="300" font-family="'Space Grotesk',system-ui,sans-serif" font-size="92" font-weight="700" fill="#ffffff" letter-spacing="-2">ROBO<tspan fill="#22d3ee">SOLE</tspan></text>
  <text x="264" y="360" font-family="Inter,system-ui,sans-serif" font-size="30" fill="#c0c4cc">High-performance footwear for humanoid robots.</text>
  <text x="264" y="410" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#7c828e" letter-spacing="3">FORGED LOCALLY · BUILT FOR THE GROUND · robosole.io</text>
</svg>
