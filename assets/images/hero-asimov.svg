<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="The Menlo Asimov humanoid robot standing in RoboSole footwear">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c1014"/><stop offset="0.6" stop-color="#080a0d"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <radialGradient id="spot" cx="67%" cy="38%" r="46%"><stop offset="0" stop-color="#123039" stop-opacity="0.9"/><stop offset="0.6" stop-color="#0a1a20" stop-opacity="0.4"/><stop offset="1" stop-color="#050608" stop-opacity="0"/></radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#232830"/><stop offset="0.5" stop-color="#151920"/><stop offset="1" stop-color="#0a0c10"/></linearGradient>
    <linearGradient id="panelHi" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2e343e"/><stop offset="1" stop-color="#12151b"/></linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e3b676"/><stop offset="1" stop-color="#8a5a24"/></linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#67e8f9"/><stop offset="0.5" stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="tread" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22262e"/><stop offset="1" stop-color="#0a0b0e"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="16"/></filter>

    <!-- One side of the robot (robot's limbs); mirrored around x=1080 for the other side -->
    <g id="side">
      <!-- shoulder actuator disc -->
      <circle cx="1196" cy="338" r="45" fill="url(#panel)" stroke="#3a414c" stroke-width="2"/>
      <circle cx="1196" cy="338" r="30" fill="none" stroke="url(#warm)" stroke-width="5"/>
      <g fill="#0d0f13"><circle cx="1196" cy="314" r="3.4"/><circle cx="1217" cy="326" r="3.4"/><circle cx="1217" cy="350" r="3.4"/><circle cx="1196" cy="362" r="3.4"/><circle cx="1175" cy="350" r="3.4"/><circle cx="1175" cy="326" r="3.4"/></g>
      <!-- upper arm -->
      <path d="M1176 356 C1204 350 1230 358 1234 388 L1240 452 C1242 474 1228 486 1210 486 C1194 486 1184 474 1182 454 L1176 388 Z" fill="url(#panel)" stroke="#3a414c" stroke-width="2"/>
      <!-- elbow disc -->
      <circle cx="1212" cy="490" r="28" fill="url(#panelHi)" stroke="#3a414c" stroke-width="2"/>
      <circle cx="1212" cy="490" r="16" fill="none" stroke="url(#warm)" stroke-width="4"/>
      <!-- forearm -->
      <path d="M1192 506 C1214 502 1232 510 1232 532 L1236 602 C1237 622 1224 632 1210 632 C1196 632 1188 622 1187 602 L1186 532 C1186 516 1184 510 1192 506 Z" fill="url(#panel)" stroke="#3a414c" stroke-width="2"/>
      <!-- hand -->
      <path d="M1198 632 h30 a7 7 0 0 1 7 7 l-3 34 a11 11 0 0 1 -11 10 h-16 a9 9 0 0 1 -9 -8 l-4 -36 a7 7 0 0 1 6 -7 Z" fill="url(#panelHi)" stroke="#3a414c" stroke-width="2"/>
      <!-- thigh -->
      <path d="M1094 662 C1122 654 1152 662 1158 694 L1170 762 C1174 796 1152 812 1128 812 C1110 812 1098 800 1096 782 L1088 704 C1086 682 1088 668 1094 662 Z" fill="url(#panel)" stroke="#3a414c" stroke-width="2"/>
      <!-- knee disc -->
      <circle cx="1152" cy="806" r="34" fill="url(#panel)" stroke="#3a414c" stroke-width="2"/>
      <circle cx="1152" cy="806" r="20" fill="none" stroke="url(#warm)" stroke-width="5"/>
      <g fill="#0d0f13"><circle cx="1152" cy="788" r="3"/><circle cx="1168" cy="806" r="3"/><circle cx="1152" cy="824" r="3"/><circle cx="1136" cy="806" r="3"/></g>
      <!-- shin -->
      <path d="M1130 818 C1152 812 1170 820 1170 844 L1164 902 C1162 918 1150 926 1136 924 L1122 922 C1110 918 1106 906 1108 892 L1118 844 C1120 828 1124 822 1130 818 Z" fill="url(#panel)" stroke="#3a414c" stroke-width="2"/>

      <!-- FOOT: RoboSole Tread (lugged base) + cyan Shell, with a Klasp seam -->
      <!-- tread / sole -->
      <path d="M1108 934 C1108 924 1120 922 1150 924 L1236 930 C1256 932 1258 946 1252 956 L1246 968 C1242 974 1230 974 1216 974 L1120 972 C1102 972 1098 962 1100 950 Z" fill="url(#tread)" stroke="#20242c" stroke-width="2"/>
      <g fill="#101215" stroke="#2b3038" stroke-width="1.3"><rect x="1116" y="964" width="26" height="14" rx="3"/><rect x="1150" y="965" width="26" height="14" rx="3"/><rect x="1184" y="964" width="26" height="13" rx="3"/><rect x="1216" y="962" width="24" height="12" rx="3"/></g>
      <!-- shell (cyan top) -->
      <path d="M1120 930 C1122 902 1140 888 1170 888 C1210 887 1240 902 1246 926 C1248 936 1240 942 1226 942 L1132 940 C1120 940 1119 936 1120 930 Z" fill="url(#shell)" stroke="#a5f3fc" stroke-width="2" filter="url(#glow)"/>
      <path d="M1150 906 C1175 896 1205 900 1228 916" fill="none" stroke="#ecfeff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <!-- Klasp seam line where shell meets tread -->
      <path d="M1122 936 L1244 934" stroke="#0891b2" stroke-width="2.5" opacity="0.9"/>
    </g>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#spot)"/>
  <g stroke="#22d3ee" stroke-opacity="0.09" stroke-width="1"><path d="M0 780H1600M0 850H1600M0 925H1600"/><path d="M300 760 L120 1000M650 760 L560 1000M1080 760 L1080 1000M1500 760 L1600 900"/></g>
  <ellipse cx="1080" cy="706" rx="176" ry="20" fill="#22d3ee" fill-opacity="0.2" filter="url(#soft)"/>
  <g fill="#f97316"><circle cx="1360" cy="230" r="3" fill-opacity="0.9"/><circle cx="1402" cy="285" r="2.2" fill-opacity="0.7"/><circle cx="1330" cy="315" r="2.4" fill-opacity="0.6"/><circle cx="1420" cy="205" r="1.8" fill-opacity="0.8"/></g>

  <!-- FIGURE (centered at x=1080), scaled to keep the head AND the RoboSole feet in frame under object-cover -->
  <g transform="translate(381,70) scale(0.647)">
  <!-- limbs behind torso: draw both sides via the mirrored group -->
  <use xlink:href="#side"/>
  <use xlink:href="#side" transform="matrix(-1,0,0,1,2160,0)"/>

  <!-- pelvis plate -->
  <path d="M1042 566 C1038 560 1050 557 1080 557 C1110 557 1122 560 1118 566 L1122 652 C1122 666 1108 672 1080 672 C1052 672 1038 666 1038 652 Z" fill="url(#panel)" stroke="#3a414c" stroke-width="2"/>
  <ellipse cx="1080" cy="616" rx="18" ry="26" fill="#0d0f13" stroke="#2b3038" stroke-width="1.5"/>

  <!-- torso (V-taper shield) -->
  <path d="M1080 298 C1150 300 1184 316 1186 344 C1188 424 1150 504 1108 550 L1080 560 L1052 550 C1010 504 972 424 974 344 C976 316 1010 300 1080 298 Z" fill="url(#panel)" stroke="#3a414c" stroke-width="2.5"/>
  <path d="M1080 312 C1140 314 1168 328 1170 350 C1172 420 1140 486 1104 528" fill="none" stroke="#2e343e" stroke-width="2" opacity="0.7"/>
  <!-- central seam -->
  <path d="M1080 316 L1080 548" stroke="#0b0d11" stroke-width="3"/>
  <!-- sternum connector detail -->
  <g><rect x="1070" y="352" width="20" height="26" rx="4" fill="#0d0f13" stroke="#3a414c" stroke-width="1.5"/><path d="M1075 360 v10 M1085 360 v10" stroke="url(#shell)" stroke-width="2.5" filter="url(#glow)"/></g>
  <!-- rim light on torso edges -->
  <path d="M1052 550 C1010 504 972 424 974 344 C975 330 984 320 998 312" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.75" filter="url(#glow)"/>
  <path d="M1108 550 C1150 504 1188 424 1186 344 C1185 330 1176 320 1162 312" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.5" filter="url(#glow)"/>

  <!-- neck -->
  <path d="M1058 268 h44 l-4 26 h-36 Z" fill="url(#panelHi)" stroke="#3a414c" stroke-width="2"/>

  <!-- HEAD: signature ridged wrapped helmet, slight forward tilt, blank cyan visor -->
  <g transform="rotate(-5 1080 200)">
    <path d="M1028 158 C1028 136 1050 124 1080 124 C1110 124 1132 136 1132 158 L1134 236 C1134 260 1112 272 1080 272 C1048 272 1026 260 1026 236 Z" fill="url(#panel)" stroke="#3a414c" stroke-width="2.5"/>
    <!-- wrap ridges -->
    <path d="M1034 160 C1050 146 1110 146 1126 160" fill="none" stroke="#2b3038" stroke-width="3"/>
    <path d="M1032 176 C1050 162 1110 162 1128 176" fill="none" stroke="#2b3038" stroke-width="3"/>
    <path d="M1031 192 C1050 180 1110 180 1129 192" fill="none" stroke="#2b3038" stroke-width="2.5"/>
    <!-- blank visor with cyan glow slit -->
    <rect x="1042" y="204" width="76" height="40" rx="16" fill="#07090c" stroke="#2b3038" stroke-width="1.5"/>
    <rect x="1052" y="220" width="56" height="7" rx="3.5" fill="url(#shell)" filter="url(#glow)"/>
    <!-- head rim light -->
    <path d="M1028 200 L1027 236 C1027 252 1040 264 1060 268" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  </g>

  </g>
  <!-- foreground vignette -->
  <rect width="1600" height="1000" fill="url(#bg)" opacity="0.12"/>
  <rect width="700" height="1000" fill="url(#bg)" opacity="0.35"/>
</svg>
