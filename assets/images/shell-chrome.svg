  <path d="M215 360 C320 342 470 344 585 372" fill="none" stroke="#475569" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M240 386 C330 374 460 376 560 392" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
