<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Sole Series 01 Daily Tread — the RoboSole functional boot base for humanoid robots">
  <defs>
    <radialGradient id="s1bg" cx="50%" cy="44%" r="70%"><stop offset="0" stop-color="#12161c"/><stop offset="1" stop-color="#070809"/></radialGradient>
    <linearGradient id="s1metal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2a2f38"/><stop offset="0.55" stop-color="#171a20"/><stop offset="1" stop-color="#0c0e12"/></linearGradient>
    <linearGradient id="s1sole" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181b21"/><stop offset="1" stop-color="#0a0b0e"/></linearGradient>
    <linearGradient id="s1cyan" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
    <filter id="s1glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#s1bg)"/>
  <g stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"><path d="M0 150H800M0 300H800M0 450H800M200 0V600M400 0V600M600 0V600"/></g>
  <ellipse cx="410" cy="486" rx="270" ry="30" fill="#22d3ee" fill-opacity="0.12" filter="url(#s1glow)"/>

  <!-- boot base body (side profile, heel left / toe right, upturned toe) -->
  <path d="M200 472 C195 435 198 372 204 332 C208 300 226 288 260 286 L388 286 C468 292 548 316 604 352 C646 376 668 396 662 420 C658 436 640 444 620 450 L250 474 C224 474 205 468 200 472 Z" fill="url(#s1metal)" stroke="#3a414c" stroke-width="2"/>
  <!-- structural instep cage (functional base, not a styled upper) -->
  <g stroke="#3a414c" stroke-width="1.6" fill="none" opacity="0.7"><path d="M300 300 C380 300 470 320 560 360"/><path d="M330 330 L560 388"/><path d="M300 300 L300 286 M360 300 L360 288 M430 306 L430 292"/></g>
  <!-- ankle-mount collar (where the robot foot enters) -->
  <ellipse cx="332" cy="288" rx="66" ry="15" fill="#0b0d11" stroke="#2b3038" stroke-width="2"/>
  <ellipse cx="332" cy="288" rx="52" ry="9" fill="none" stroke="url(#s1cyan)" stroke-width="2" opacity="0.8"/>
  <!-- midsole accent line -->
  <path d="M214 438 L616 432" stroke="url(#s1cyan)" stroke-width="4" filter="url(#s1glow)"/>
  <!-- toe roller -->
  <circle cx="650" cy="424" r="11" fill="#0d0f13" stroke="url(#s1cyan)" stroke-width="2"/>
  <!-- outsole -->
  <path d="M206 452 L636 446 Q660 446 658 462 L652 476 Q648 484 630 484 L226 488 Q202 488 202 470 Z" fill="url(#s1sole)" stroke="#20242c" stroke-width="2"/>
  <g fill="#14171c" stroke="#262b33" stroke-width="1.3"><rect x="216" y="470" width="46" height="20" rx="5"/><rect x="278" y="470" width="46" height="21" rx="5"/><rect x="340" y="470" width="46" height="21" rx="5"/><rect x="402" y="469" width="46" height="20" rx="5"/><rect x="464" y="467" width="46" height="19" rx="5"/><rect x="526" y="464" width="44" height="18" rx="5"/><rect x="584" y="460" width="40" height="16" rx="5"/></g>
  <text x="400" y="556" text-anchor="middle" font-family="'Space Grotesk',system-ui,sans-serif" font-size="21" letter-spacing="5" fill="#7c828e">SOLE SERIES 01 · DAILY TREAD</text>
</svg>
