<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Humanoid robot stepping in a RoboSole tread">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1014"/>
      <stop offset="0.55" stop-color="#080a0d"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <radialGradient id="spot" cx="62%" cy="35%" r="55%">
      <stop offset="0" stop-color="#0e343f"/>
      <stop offset="0.5" stop-color="#0a1a20" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#050608" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3038"/>
      <stop offset="0.5" stop-color="#171b21"/>
      <stop offset="1" stop-color="#0c0e12"/>
    </linearGradient>
    <linearGradient id="metalHi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a414c"/>
      <stop offset="1" stop-color="#191d24"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#spot)"/>

  <!-- grid floor -->
  <g stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1">
    <path d="M0 700 H1600 M0 760 H1600 M0 830 H1600"/>
    <path d="M200 680 L60 900 M500 680 L440 900 M800 680 L800 900 M1100 680 L1160 900 M1400 680 L1540 900"/>
  </g>

  <!-- floor contact glow -->
  <ellipse cx="900" cy="792" rx="230" ry="26" fill="#22d3ee" fill-opacity="0.16" filter="url(#glow)"/>

  <!-- distant forge sparks -->
  <g fill="#f97316">
    <circle cx="1290" cy="250" r="3" fill-opacity="0.9"/>
    <circle cx="1330" cy="300" r="2" fill-opacity="0.7"/>
    <circle cx="1250" cy="330" r="2.4" fill-opacity="0.6"/>
    <circle cx="1360" cy="210" r="1.8" fill-opacity="0.8"/>
  </g>

  <!-- ROBOT LEG -->
  <g>
    <!-- upper leg -->
    <path d="M792 120 L900 110 L928 420 L812 440 Z" fill="url(#metal)" stroke="#3a414c" stroke-width="2"/>
    <path d="M905 120 L928 420 L905 424 L888 130 Z" fill="url(#metalHi)" opacity="0.6"/>
    <!-- knee actuator -->
    <circle cx="864" cy="440" r="46" fill="url(#metal)" stroke="#3a414c" stroke-width="3"/>
    <circle cx="864" cy="440" r="20" fill="none" stroke="url(#cyan)" stroke-width="4" filter="url(#glow)"/>
    <!-- shin -->
    <path d="M828 470 L905 462 L940 690 L858 700 Z" fill="url(#metal)" stroke="#3a414c" stroke-width="2"/>
    <!-- hydraulic line -->
    <path d="M912 470 L946 686" stroke="url(#cyan)" stroke-width="5" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>
    <!-- ankle -->
    <circle cx="905" cy="700" r="30" fill="url(#metal)" stroke="#3a414c" stroke-width="3"/>
    <circle cx="905" cy="700" r="10" fill="url(#cyan)"/>

    <!-- FOOT + RoboSole tread -->
    <g>
      <!-- foot chassis -->
      <path d="M812 700 Q828 682 900 690 L1010 706 Q1050 712 1050 736 L1040 754 L800 760 Q784 742 812 700 Z" fill="url(#metal)" stroke="#3a414c" stroke-width="2"/>
      <!-- accent line -->
      <path d="M804 748 L1044 742" stroke="url(#cyan)" stroke-width="3" opacity="0.9" filter="url(#glow)"/>
      <!-- sole body -->
      <path d="M792 758 L1052 752 Q1074 752 1072 772 L1064 792 Q1060 800 1046 800 L806 806 Q788 806 786 790 Z" fill="#0c0e12" stroke="#20242c" stroke-width="2"/>
      <!-- tread lugs -->
      <g fill="#171b21" stroke="#2b3038" stroke-width="1.5">
        <rect x="804" y="795" width="34" height="20" rx="4"/>
        <rect x="850" y="796" width="34" height="21" rx="4"/>
        <rect x="896" y="796" width="34" height="22" rx="4"/>
        <rect x="942" y="795" width="34" height="21" rx="4"/>
        <rect x="988" y="794" width="34" height="20" rx="4"/>
        <rect x="1030" y="792" width="30" height="18" rx="4"/>
      </g>
    </g>
  </g>

  <!-- foreground vignette -->
  <rect width="1600" height="900" fill="url(#bg)" opacity="0.15"/>
</svg>
