  <path d="M170 402 C170 300 232 246 344 240 C474 233 566 274 610 334 C628 360 624 392 600 402 Z" fill="url(#smfill)" stroke="#fed7aa" stroke-width="2" filter="url(#smglow)"/>
  <path d="M235 300 C320 262 430 262 520 300" fill="none" stroke="#fff7ed" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- molten flow veins -->
  <g stroke="#9a3412" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round">
    <path d="M260 350 C300 330 340 360 380 340 C420 320 470 350 520 330"/>
    <path d="M280 375 C330 360 360 380 410 366 C450 356 490 372 540 360"/>
