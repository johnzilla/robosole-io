  <g fill="#3a1a0c" stroke="#ea580c" stroke-width="1.5"><rect x="214" y="400" width="42" height="20" rx="4"/><rect x="378" y="402" width="42" height="20" rx="4"/><rect x="512" y="400" width="42" height="20" rx="4"/></g>
  <text x="400" y="548" text-anchor="middle" font-family="'Space Grotesk',system-ui,sans-serif" font-size="22" letter-spacing="4" fill="#7c828e">SHELL · MOLTEN</text>
