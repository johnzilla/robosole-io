<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" role="img" aria-label="Exploded diagram: a stylish cyan Shell upper lifts off an engineered lugged Tread boot base — they snap together into one complete robot shoe">
  <defs>
    <radialGradient id="sysbg" cx="50%" cy="40%" r="74%"><stop offset="0" stop-color="#0e161a"/><stop offset="1" stop-color="#060809"/></radialGradient>
    <linearGradient id="sysShell" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#67e8f9"/><stop offset="0.5" stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="sysMetal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2a2f38"/><stop offset="0.55" stop-color="#171a20"/><stop offset="1" stop-color="#0b0d11"/></linearGradient>
    <linearGradient id="sysSole" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181b21"/><stop offset="1" stop-color="#0a0b0e"/></linearGradient>
    <filter id="sysglow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="640" fill="url(#sysbg)"/>
  <g stroke="#22d3ee" stroke-opacity="0.07" stroke-width="1"><path d="M0 160H800M0 320H800M0 480H800M200 0V640M400 0V640M600 0V640"/></g>

  <!-- SHELL upper (floating on top, cyan) -->
  <g filter="url(#sysglow)">
    <path d="M150 214 C150 172 176 150 236 148 C332 145 430 166 500 200 C532 216 526 240 502 242 L188 246 C160 246 150 238 150 214 Z" fill="url(#sysShell)" stroke="#a5f3fc" stroke-width="2"/>
    <path d="M210 176 C300 148 400 150 476 190" fill="none" stroke="#ecfeff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- shell magnet pads / pins on the underside -->
  <g fill="#0e3a44" stroke="#0891b2" stroke-width="1.5"><rect x="210" y="244" width="34" height="16" rx="4"/><rect x="330" y="246" width="34" height="16" rx="4"/><rect x="446" y="244" width="34" height="16" rx="4"/></g>
  <text x="560" y="196" font-family="'Space Grotesk',system-ui,sans-serif" font-size="26" font-weight="700" fill="#22d3ee">SHELL</text>
  <text x="560" y="220" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#7c828e">the style · snaps on</text>

  <!-- snap-together zone (concept only, no named mechanism) -->
  <g stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.85"><path d="M300 296 v34 M330 296 v34 M360 296 v34" stroke-dasharray="4 6"/></g>
  <path d="M330 336 l-13 -17 h8 v-15 h10 v15 h8 Z" fill="#22d3ee" filter="url(#sysglow)"/>
  <text x="386" y="322" font-family="'Space Grotesk',system-ui,sans-serif" font-size="18" font-weight="600" fill="#c0c4cc" letter-spacing="1.5">SNAP TOGETHER</text>

  <!-- TREAD boot base (bottom, side profile — rounded upturned toe + toe-roller) -->
  <!-- sockets that receive the shell pads -->
  <g fill="#0a0b0e" stroke="#0891b2" stroke-width="1.5" opacity="0.9"><rect x="210" y="360" width="34" height="13" rx="3"/><rect x="330" y="360" width="34" height="13" rx="3"/><rect x="446" y="360" width="34" height="13" rx="3"/></g>
  <path d="M154 520 C149 482 152 416 158 378 C162 346 180 334 214 332 L360 332 C452 338 548 362 606 400 C650 424 674 446 668 472 C664 490 644 500 620 506 L206 520 C180 520 160 512 154 520 Z" fill="url(#sysMetal)" stroke="#3a414c" stroke-width="2"/>
  <!-- structural cage -->
  <g stroke="#3a414c" stroke-width="1.6" fill="none" opacity="0.6"><path d="M250 348 C340 348 440 368 540 410"/><path d="M280 378 L548 440"/></g>
  <!-- ankle-mount collar -->
  <ellipse cx="288" cy="334" rx="66" ry="15" fill="#0b0d11" stroke="#2b3038" stroke-width="2"/>
  <ellipse cx="288" cy="334" rx="52" ry="9" fill="none" stroke="url(#sysShell)" stroke-width="2" opacity="0.8"/>
  <!-- midsole accent -->
  <path d="M168 486 L622 478" stroke="url(#sysShell)" stroke-width="4" filter="url(#sysglow)"/>
  <!-- toe roller -->
  <circle cx="656" cy="474" r="11" fill="#0d0f13" stroke="url(#sysShell)" stroke-width="2"/>
  <!-- outsole + lugs -->
  <path d="M160 498 L642 490 Q666 490 664 506 L656 522 Q652 530 634 530 L182 534 Q158 534 156 514 Z" fill="url(#sysSole)" stroke="#20242c" stroke-width="2"/>
  <g fill="#14171c" stroke="#262b33" stroke-width="1.3"><rect x="172" y="514" width="46" height="20" rx="5"/><rect x="234" y="514" width="46" height="21" rx="5"/><rect x="296" y="514" width="46" height="21" rx="5"/><rect x="358" y="513" width="46" height="20" rx="5"/><rect x="420" y="511" width="46" height="19" rx="5"/><rect x="482" y="508" width="44" height="18" rx="5"/><rect x="540" y="504" width="40" height="16" rx="5"/></g>
  <text x="600" y="440" font-family="'Space Grotesk',system-ui,sans-serif" font-size="26" font-weight="700" fill="#ffffff">TREAD</text>
  <text x="600" y="464" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#7c828e">the machine · stays on</text>

  <text x="400" y="618" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="15" letter-spacing="3" fill="#7c828e">ONE TREAD · ENDLESS SHELLS · SWAP IN SECONDS</text>
</svg>
