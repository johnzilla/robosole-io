name: robosole
region: nyc
domains:
  # Apex-native (same pattern as poopix.ai): bare robosole.io serves directly
  # via A records to DO's App Platform edge IPs (162.159.140.98 / 172.66.0.96)
  # at DreamHost; www is an alias that DO redirects to the apex. DNS + email
  # stay at DreamHost.
  - domain: robosole.io
    type: PRIMARY
  - domain: www.robosole.io
    type: ALIAS
static_sites:
  - name: web
    github:
      repo: johnzilla/robosole-io
      branch: main
      deploy_on_push: true
    # Pre-built static site: no build step. index.html + assets live at the root.
    source_dir: /
    output_dir: /
    index_document: index.html
    catchall_document: index.html
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
